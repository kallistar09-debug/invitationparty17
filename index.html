<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>SENN — Sweet Seventeen Invitation</title>
<meta name="description" content="You're invited to Senn's Sweet Seventeen birthday celebration.">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
</head>
<body>

  <!-- Ambient background layers -->
  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <!-- ============================= LOADING SCREEN ============================= -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="loading-logo">SENN</div>
      <div class="loading-sub">Sweet Seventeen</div>
      <div class="loading-wave-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ============================= ROLE SELECTION ============================= -->
  <main class="stage">
    <div class="content-layer" id="role-selection">

      <div class="hero-heading">
        <span class="eyebrow">Welcome</span>
        <h1 class="page-title">Please choose how<br>you'd like to continue</h1>
      </div>

      <div class="role-grid">

        <!-- Join Invitation -->
        <div class="glass-card hoverable role-card fade-in-up delay-1" id="card-join">
          <svg class="role-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 8 C20 8 10 18 10 28 C10 40 22 50 32 56 C42 50 54 40 54 28 C54 18 44 8 32 8Z" stroke="currentColor" stroke-width="2.5" fill="rgba(207,175,134,0.12)"/>
            <path d="M22 30 L29 37 L43 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h3>Join Invitation</h3>
          <p class="subtitle">Join Senn's Sweet 17 Birthday Invitation</p>
          <button class="btn btn-primary">ENTER</button>
        </div>

        <!-- Admin -->
        <div class="glass-card hoverable role-card fade-in-up delay-2" id="card-admin">
          <svg class="role-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="14" y="26" width="36" height="26" rx="6" stroke="currentColor" stroke-width="2.5" fill="rgba(207,175,134,0.12)"/>
            <path d="M22 26 V18 a10 10 0 0 1 20 0 v8" stroke="currentColor" stroke-width="2.5"/>
            <circle cx="32" cy="38" r="3" fill="currentColor"/>
          </svg>
          <h3>Admin</h3>
          <p class="subtitle">Private Dashboard</p>
          <button class="btn btn-ghost">LOGIN</button>
        </div>

      </div>

      <div class="text-center" style="margin-top:2.5rem;" data-aos="fade-up">
        <span class="script" style="font-size:1.6rem;">See you at the beach ✨</span>
      </div>

    </div>
  </main>

  <!-- Decorative palm leaf, bottom corner -->
  <svg class="palm-leaf" style="position:fixed; bottom:-10px; left:-20px; width:140px; opacity:0.55; z-index:1; pointer-events:none;" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 190 C100 140 60 120 20 110 C60 100 90 70 90 30" stroke="#3F8A5C" stroke-width="6" fill="none" opacity="0.4"/>
    <path d="M100 190 C100 140 140 120 180 110 C140 100 110 70 110 30" stroke="#3F8A5C" stroke-width="6" fill="none" opacity="0.4"/>
  </svg>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/effects.js"></script>
</body>
</html>
