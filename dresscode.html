<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Dress Code — SENN Sweet Seventeen</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <div class="nav-back" data-target="save-date.html" aria-label="Go back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <div class="flow-progress">
    <span class="dot"></span><span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <main class="stage">
    <div class="content-layer">
      <div class="glass-card text-center">
        <span class="eyebrow">Dress Code</span>
        <h2 class="page-title" style="font-size:clamp(2rem,5vw,2.8rem); margin-top:0.5rem;">What to Wear</h2>

        <div class="dress-grid">
          <div class="dress-card boys">
            <div class="swatch boys-swatch"></div>
            <h3>Boys</h3>
            <p>Pink</p>
          </div>
          <div class="dress-card girls">
            <div class="swatch girls-swatch"></div>
            <h3>Girls</h3>
            <p>Creme</p>
          </div>
        </div>

        <p class="subtitle">Dress up, bring your best smile, and let's make unforgettable memories together.</p>

        <button class="btn btn-primary mt-2" data-nav-next="rsvp.html">Continue</button>
      </div>
    </div>
  </main>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>window.SennGuard.requireInvite('index.html');</script>
  <script src="js/effects.js"></script>
</body>
</html>
