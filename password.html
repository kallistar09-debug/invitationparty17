<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>A Secret Invitation — SENN Sweet Seventeen</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <div class="nav-back" data-target="index.html" aria-label="Go back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <main class="stage">
    <div class="content-layer">
      <div class="glass-card password-card" id="password-card">

        <svg class="password-lock" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="14" y="28" width="36" height="26" rx="6" stroke="currentColor" stroke-width="2.5" fill="rgba(207,175,134,0.12)"/>
          <path d="M22 28 V20 a10 10 0 0 1 20 0 v8" stroke="currentColor" stroke-width="2.5"/>
          <circle cx="32" cy="40" r="3" fill="currentColor"/>
        </svg>

        <span class="eyebrow">A Secret Invitation</span>
        <p class="subtitle" style="margin-top:0.75rem;">Before opening this invitation,<br>please enter the secret code.</p>

        <div class="code-inputs">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
        </div>

        <p class="code-hint">Hint: it's my birth year.</p>
        <p id="code-feedback" class="code-feedback"></p>

        <svg id="success-check" class="success-check" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" fill="rgba(79,155,110,0.15)" stroke="#4F9B6E" stroke-width="2.5"/>
          <path d="M20 33 L28 41 L44 24" stroke="#4F9B6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <button id="start-btn" class="btn btn-primary hidden" style="margin-top:1rem;">START</button>
      </div>
    </div>
  </main>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/password.js"></script>
</body>
</html>
