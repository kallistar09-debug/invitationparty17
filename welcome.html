<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Happy Sweet 17th, Senn</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <div class="flow-progress">
    <span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <main class="stage">
    <div class="content-layer">
      <div class="glass-card welcome-frame" id="welcome-card">
        <span class="script" style="font-size:2rem;">Happy Sweet 17th</span>
        <h1 class="page-title" style="margin-top:0.25rem;">SENN</h1>

        <p class="welcome-typed"><span id="typed-text"></span><span class="cursor-blink">&nbsp;</span></p>

        <button class="btn btn-primary" data-nav-next="save-date.html">Continue</button>
      </div>
    </div>
  </main>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>window.SennGuard.requireInvite('index.html');</script>
  <script src="js/effects.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Typed) {
        new Typed('#typed-text', {
          strings: [
            'You have officially unlocked my birthday invitation.',
            "I'm so happy you're here."
          ],
          typeSpeed: 32,
          backSpeed: 0,
          startDelay: 400,
          backDelay: 1400,
          loop: false,
          showCursor: false
        });
      }
      if (window.gsap) {
        gsap.from('#welcome-card', { y: 40, opacity: 0, duration: 1, ease: 'power3.out' });
      }
    });
  </script>
</body>
</html>
