<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Save the Date — SENN Sweet Seventeen</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <canvas id="wave-canvas" class="bg-canvas-layer"></canvas>
  <div id="bubble-layer" class="bg-canvas-layer"></div>
  <div id="sparkle-layer" class="bg-canvas-layer"></div>

  <div class="nav-back" data-target="welcome.html" aria-label="Go back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <div class="flow-progress">
    <span class="dot"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <main class="stage">
    <div class="content-layer">
      <div class="glass-card text-center">
        <span class="eyebrow">Save the Date</span>

        <div class="date-block">
          <div class="date-big display">15 August 2026</div>
          <div class="date-time">12.40 WIB</div>
        </div>

        <div class="location-box">
          <div class="eyebrow" style="margin-bottom:0.35rem;">Location</div>
          <div class="loc-name">saya psuci kelapa gading</div>
          <a class="btn btn-ghost btn-sm mt-2" style="margin-top:1rem;"
             href="https://maps.app.goo.gl/iecXUReEoKtF6AeU6"
             target="_blank" rel="noopener">
            Open Maps
          </a>
        </div>

        <p class="quote-line">Don't be late... I'll be waiting for you.</p>

        <button class="btn btn-primary mt-2" data-nav-next="dresscode.html">Continue</button>
      </div>
    </div>
  </main>

  <audio id="bg-audio" loop preload="none">
    <source src="assets/audio/ambient-ocean-piano.mp3" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" aria-label="Toggle background music">
    <div class="music-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
  </button>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>window.SennGuard.requireInvite('index.html');</script>
  <script src="js/effects.js"></script>
</body>
</html>
